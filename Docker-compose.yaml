services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENV=production
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app/ProductosFotos/
  db:
    image: mysql:8.4.8
    env_file:
      - .env
    ports:
      - "8001:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
